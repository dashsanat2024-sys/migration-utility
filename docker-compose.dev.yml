services:
  api:
    volumes:
      - ./migration_utility:/app/migration_utility
    command: uvicorn migration_utility.main:app --host 0.0.0.0 --port 8000 --reload

  frontend-dev:
    image: node:22-alpine
    container_name: migration_utility_ui_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: http://api:8000
    depends_on:
      - api
